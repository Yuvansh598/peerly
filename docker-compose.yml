version: '3.8'

services:
  postgres:
    image: postgres:16
    container_name: peerly-postgres
    environment:
      POSTGRES_USER: peerly
      POSTGRES_PASSWORD: peerlypassword
      POSTGRES_DB: peerly
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7
    container_name: peerly-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
